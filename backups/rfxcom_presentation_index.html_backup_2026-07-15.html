<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RFXCOM - Configuration</title>
  
  <!-- Styles communs -->
  <link rel="stylesheet" href="/styles/general.css">
  <link rel="stylesheet" href="/styles/config-form.css">
  
  <!-- Styles spécifiques RFXCOM -->
  <link rel="stylesheet" href="/applications/rfxcom/presentation/styles/rfxcom.css">
</head>
<body>
  <div class="rfxcom-container">
    <!-- En-tête -->
    <header class="rfxcom-header">
      <h1>📡 RFXCOM - Intégration RF433</h1>
      <p class="subtitle">Gestion des devices, récepteurs et associations</p>
    </header>

    <!-- Barre d'outils -->
    <div class="rfxcom-toolbar">
      <button id="btn-scan" class="btn btn-primary" x-data="{ scanning: false }" 
              @click="scanning = true; $socket.emit('rfxcom:scan:start'); setTimeout(() => scanning = false, 10000)"
              :disabled="scanning">
        <span x-show="!scanning">🔍 Scanner RF433</span>
        <span x-show="scanning">⏳ Scanning...</span>
      </button>
      <button id="btn-refresh" class="btn btn-secondary" @click="$socket.emit('rfxcom:devices:list')">
        🔄 Rafraîchir
      </button>
      <button id="btn-save-config" class="btn btn-success" @click="$socket.emit('config:save:requested')">
        💾 Sauvegarder
      </button>
    </div>

    <!-- Onglets principaux -->
    <div class="rfxcom-tabs">
      <button class="tab-btn active" data-tab="devices">📱 Devices (capteurs & émetteurs)</button>
      <button class="tab-btn" data-tab="receivers">🎯 Récepteurs logiques</button>
      <button class="tab-btn" data-tab="associations">🔗 Associations</button>
      <button class="tab-btn" data-tab="scenes">🎭 Scènes</button>
    </div>

    <!-- Contenu des onglets -->
    <main class="rfxcom-main">
      <!-- Onglet Devices -->
      <div id="tab-devices" class="tab-content active">
        <rfxcom-devices-list></rfxcom-devices-list>
      </div>

      <!-- Onglet Récepteurs -->
      <div id="tab-receivers" class="tab-content">
        <rfxcom-receivers-manager></rfxcom-receivers-manager>
      </div>

      <!-- Onglet Associations -->
      <div id="tab-associations" class="tab-content">
        <rfxcom-associations-manager></rfxcom-associations-manager>
      </div>

      <!-- Onglet Scènes -->
      <div id="tab-scenes" class="tab-content">
        <rfxcom-scenes-manager></rfxcom-scenes-manager>
      </div>
    </main>

    <!-- Modale de détail d'un device -->
    <rfxcom-device-modal></rfxcom-device-modal>
    
    <!-- Modale de création/modification d'un récepteur -->
    <rfxcom-receiver-modal></rfxcom-receiver-modal>

    <!-- Chargement initial -->
    <script>
      // Charger les Web Components RFXCOM
      document.addEventListener('DOMContentLoaded', function() {
        // Charger le bundle TypeScript compilé
        const script = document.createElement('script');
        script.src = '/applications/rfxcom/presentation/js/app.bundle.js';
        script.defer = true;
        document.body.appendChild(script);
      });
    </script>
  </div>
</body>
</html>
