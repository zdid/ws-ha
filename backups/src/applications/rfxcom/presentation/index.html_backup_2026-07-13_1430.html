<!DOCTYPE html>

<!-- src/applications/rfxcom/presentation/index.html -->
<!-- Interface de configuration RFXCOM -->
<!-- Conforme à specs-presentation-v2.0.md §8 -->
<!-- Ce fichier est chargé dynamiquement et utilise le store rfxcomStore -->

<script>window.deferAlpineStart = true;</script>

<div class="rfxcom-main" x-data="Alpine.store('rfxcomStore')">
  
  <!-- Onglets RFXCOM -->
  <div class="rfxcom-tabs">
    <button 
      @click="setActiveTab('devices')" 
      :class="{ 'tab-active': activeTab === 'devices' }"
      class="rfxcom-tab"
    >
      📡 Objets Natifs
      <span class="tab-count" x-show="stats.devicesCount > 0" x-text="stats.devicesCount"></span>
    </button>
    
    <button 
      @click="setActiveTab('receivers')" 
      :class="{ 'tab-active': activeTab === 'receivers' }"
      class="rfxcom-tab"
    >
      🎯 Récepteurs
      <span class="tab-count" x-show="stats.receiversCount > 0" x-text="stats.receiversCount"></span>
    </button>
    
    <!-- Onglet Scènes -->
    <button 
      @click="setActiveTab('scenes')" 
      :class="{ 'tab-active': activeTab === 'scenes' }"
      class="rfxcom-tab"
    >
      ✨ Scènes
      <span class="tab-count" x-show="stats.scenesCount > 0" x-text="stats.scenesCount"></span>
    </button>
    
    <!-- Espace réservé pour futurs onglets -->
    <div class="tab-spacer"></div>
    
    <!-- Bouton de synchronisation -->
    <button @click="syncWithHa()" :disabled="isSyncing" class="btn btn-secondary sync-btn">
      <span x-show="!isSyncing">🔄 Sync HA</span>
      <span x-show="isSyncing">⏳ Sync...</span>
    </button>
  </div>

  <!-- Contenu de l'onglet actif -->
  <div class="rfxcom-content">
    
    <!-- Onglet: Objets Natifs -->
    <div x-show="activeTab === 'devices'" x-transition>
      <template x-if="componentsLoaded.devices">
        <div x-html="getComponent('devices')"></div>
      </template>
      <div x-show="!componentsLoaded.devices" class="loading-placeholder">
        <p>Chargement du composant Objets Natifs...</p>
      </div>
    </div>
    
    <!-- Onglet: Récepteurs -->
    <div x-show="activeTab === 'receivers'" x-transition>
      <template x-if="componentsLoaded.receivers">
        <div x-html="getComponent('receivers')"></div>
      </template>
      <div x-show="!componentsLoaded.receivers" class="loading-placeholder">
        <p>Chargement du composant Récepteurs...</p>
      </div>
    </div>
    
    <!-- Onglet: Scènes -->
    <div x-show="activeTab === 'scenes'" x-transition>
      <div class="empty-state">
        <div class="empty-icon">✨</div>
        <h4>Fonctionnalité à venir</h4>
        <p>La gestion des scènes RFXCOM sera disponible prochainement.</p>
      </div>
    </div>
  </div>

  <!-- Statut de connexion RFXCOM -->
  <div class="rfxcom-status-bar" x-show="!rfxcomConnected">
    <span class="status-icon">⚠️</span>
    <span>RFXCOM non connecté</span>
    <button @click="reconnectRfxcom()" class="btn btn-small">Reconnecter</button>
  </div>
</div>

<script>
// Initialiser le store RFXCOM s'il existe déjà (définition dans index.html principal)
if (typeof Alpine !== 'undefined' && Alpine.store('rfxcomStore')) {
  Alpine.store('rfxcomStore').init();
}
</script>
