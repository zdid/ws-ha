<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RFXCOM - Devices &amp; Récepteurs</title>

  <link rel="stylesheet" href="/styles/main.css">

  <style>
    .config-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .config-header { text-align: center; margin-bottom: 20px; }
    .config-header h1 { color: var(--color-accent); font-size: 1.8em; }

    .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid var(--color-primary); }
    .tab-btn {
      padding: 10px 20px; background: none; border: none; cursor: pointer;
      color: var(--color-text-muted); font-size: 1em; border-bottom: 3px solid transparent;
    }
    .tab-btn.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .card { background: var(--color-surface); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .card h3 { margin-top: 0; }

    .toolbar { display: flex; gap: 10px; margin-bottom: 15px; }
    .btn {
      padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 0.9em;
    }
    .btn-primary { background: var(--color-accent); color: white; }
    .btn-secondary { background: var(--color-background); color: var(--color-text); border: 1px solid var(--color-primary); }
    .btn-danger { background: var(--color-error); color: white; }
    .btn-add { background: var(--color-success); color: white; margin-top: 10px; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--color-primary); font-size: 0.9em; }
    th { color: var(--color-text-muted); font-weight: normal; }
    td.mono { font-family: monospace; }

    .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
    .badge.on { background: var(--color-success); color: white; }
    .badge.off { background: var(--color-text-muted); color: white; }

    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; font-size: 0.9em; color: var(--color-text-muted); }
    .form-control, .select-control {
      width: 100%; padding: 8px; border: 1px solid var(--color-primary); border-radius: var(--radius);
      background: var(--color-background); color: var(--color-text);
    }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .checkbox-group { display: flex; align-items: center; gap: 8px; }

    .receiver-item, .device-item {
      border: 1px solid var(--color-primary); border-radius: var(--radius); padding: 15px; margin-bottom: 12px;
    }
    .receiver-item .header, .device-item .header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    }

    .emitter-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .emitter-row select, .emitter-row input { flex: 1; }

    .alert { padding: 12px; border-radius: var(--radius); margin: 10px 0; display: none; }
    .alert-success { background: rgba(76, 175, 80, 0.1); border: 1px solid var(--color-success); color: var(--color-success); }
    .alert-error { background: rgba(244, 67, 54, 0.1); border: 1px solid var(--color-error); color: var(--color-error); }
    .alert-info { background: rgba(33, 150, 243, 0.1); border: 1px solid var(--color-accent); color: var(--color-accent); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="config-container">
    <div class="config-header">
      <h1>📡 RFXCOM — Devices &amp; Récepteurs</h1>
    </div>

    <div class="alert alert-success" id="success-alert"></div>
    <div class="alert alert-error" id="error-alert"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="devices">📋 Devices</button>
      <button class="tab-btn" data-tab="receivers">🔌 Récepteurs</button>
      <button class="tab-btn" data-tab="scenes">🎬 Scènes</button>
    </div>

    <!-- Onglet Devices -->
    <div class="tab-panel active" id="tab-devices">
      <div class="card">
        <div class="toolbar">
          <button class="btn btn-primary" id="btn-scan">🔍 Scanner RF433</button>
          <button class="btn btn-secondary" id="btn-clear-unconfigured">🗑️ Effacer non paramétrés</button>
          <button class="btn btn-secondary" id="btn-refresh-devices">🔄 Rafraîchir</button>
        </div>

        <h3>Devices paramétrés</h3>
        <table>
          <thead>
            <tr><th>Identifiant</th><th>QUOI---OÙ</th><th>Vers HA</th><th>Dernière réception</th><th></th></tr>
          </thead>
          <tbody id="configured-devices-body"></tbody>
        </table>
      </div>

      <div class="card">
        <h3>Devices en auto-découverte (non paramétrés)</h3>
        <table>
          <thead>
            <tr><th>Identifiant</th><th>QUOI (auto)</th><th>Détecté à</th><th></th></tr>
          </thead>
          <tbody id="discovered-devices-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Onglet Récepteurs -->
    <div class="tab-panel" id="tab-receivers">
      <div class="card">
        <div class="toolbar">
          <button class="btn btn-primary" id="btn-add-receiver">+ Ajouter un récepteur</button>
        </div>
        <div id="receivers-list"></div>
      </div>
    </div>

    <!-- Onglet Scènes -->
    <div class="tab-panel" id="tab-scenes">
      <div class="card">
        <div class="toolbar">
          <button class="btn btn-primary" id="btn-add-scene">+ Ajouter une scène</button>
        </div>
        <div id="scenes-list"></div>
      </div>
    </div>

    <!-- Formulaire scène (créée/éditée) -->
    <div class="card hidden" id="scene-form-card">
      <h3 id="scene-form-title">Nouvelle scène</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Identifiant</label>
          <input type="text" class="form-control" id="sc-sceneId" placeholder="scene_001">
        </div>
        <div class="form-group">
          <label>Nom (QUOI---OÙ)</label>
          <input type="text" class="form-control" id="sc-name" placeholder="Soirée---Salon">
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" class="form-control" id="sc-description" placeholder="Optionnel">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Mode d'exécution</label>
          <select class="select-control" id="sc-sceneType">
            <option value="sequential">sequential</option>
            <option value="parallel">parallel</option>
          </select>
        </div>
        <div class="form-group">
          <label>Délai entre commandes (ms, mode sequential)</label>
          <input type="number" class="form-control" id="sc-delayBetweenCommands" min="0" value="500">
        </div>
      </div>

      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="sc-transmitToHa">
          <label for="sc-transmitToHa" style="margin:0;cursor:pointer;">Transmettre vers Home Assistant (automatisation)</label>
        </div>
      </div>

      <div class="form-group">
        <label>Commandes de la scène</label>
        <div id="sc-actions-container"></div>
        <button type="button" class="btn btn-add" id="sc-add-action">+ Ajouter une commande</button>
      </div>

      <div class="toolbar">
        <button class="btn btn-secondary" id="sc-cancel">Annuler</button>
        <button class="btn btn-primary" id="sc-save">💾 Enregistrer</button>
      </div>
    </div>

    <!-- Formulaire récepteur (créé/édité) -->
    <div class="card hidden" id="receiver-form-card">
      <h3 id="receiver-form-title">Nouveau récepteur</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Identifiant</label>
          <input type="text" class="form-control" id="rf-receiverId" placeholder="recepteur_001">
        </div>
        <div class="form-group">
          <label>Nom (QUOI---OÙ)</label>
          <input type="text" class="form-control" id="rf-name" placeholder="Lumière---Salon">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Type</label>
          <select class="select-control" id="rf-type">
            <option value="switch">switch</option>
            <option value="light">light</option>
            <option value="cover">cover</option>
          </select>
        </div>
        <div class="form-group">
          <label>Émetteur principal (primaryEmitter)</label>
          <select class="select-control" id="rf-primaryEmitter"></select>
        </div>
      </div>

      <div class="form-row" id="rf-light-fields">
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="rf-isDimmable">
            <label for="rf-isDimmable" style="margin:0;cursor:pointer;">Variateur (isDimmable)</label>
          </div>
        </div>
        <div class="form-group">
          <label>Niveau par défaut (%)</label>
          <input type="number" class="form-control" id="rf-defaultLevel" min="0" max="100" value="100">
        </div>
      </div>

      <div class="form-row hidden" id="rf-cover-fields">
        <div class="form-group">
          <label>Type de cover</label>
          <select class="select-control" id="rf-coverType">
            <option value="Curtain1">Curtain1</option>
            <option value="Blind1">Blind1</option>
          </select>
        </div>
        <div class="form-group">
          <label>Temps d'ouverture (s)</label>
          <input type="number" class="form-control" id="rf-openTimeSec" min="1">
        </div>
        <div class="form-group">
          <label>Temps de fermeture (s)</label>
          <input type="number" class="form-control" id="rf-closeTimeSec" min="1">
        </div>
      </div>

      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="rf-transmitToHa">
          <label for="rf-transmitToHa" style="margin:0;cursor:pointer;">Transmettre vers Home Assistant</label>
        </div>
      </div>

      <div class="form-group">
        <label>Émetteurs appairés (N↔N)</label>
        <div id="rf-emitters-container"></div>
        <button type="button" class="btn btn-add" id="rf-add-emitter">+ Ajouter un émetteur</button>
      </div>

      <div class="toolbar">
        <button class="btn btn-secondary" id="rf-cancel">Annuler</button>
        <button class="btn btn-primary" id="rf-save">💾 Enregistrer</button>
      </div>
    </div>

    <div class="loading" id="loading" style="text-align:center;padding:20px;color:var(--color-text-muted);">
      Chargement...
    </div>
  </div>

  <!-- Page de navigation complète (pas injectée dans le Shadow DOM du core comme le tableau de
       bord) : contrairement à ce dernier, elle ne bénéficie pas du socket.io déjà chargé par
       index.html du core — il lui faut sa propre copie du script. -->
  <script defer src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="/applications/rfxcom/presentation/rfxcom/config-app.js"></script>

  <!-- Derniere modification: 2026-07-21 21:00:00 - Ajout de l'onglet Scènes -->
</body>
</html>
