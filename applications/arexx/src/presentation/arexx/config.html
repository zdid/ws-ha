<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AREXX - Capteurs</title>

  <link rel="stylesheet" href="/styles/main.css">

  <style>
    .config-container { max-width: 900px; margin: 0 auto; padding: 20px; }
    .config-header { text-align: center; margin-bottom: 20px; }
    .config-header h1 { color: var(--color-accent); font-size: 1.8em; }

    .card { background: var(--color-surface); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .card h3 { margin-top: 0; }

    .toolbar { display: flex; gap: 10px; margin-bottom: 15px; }
    .btn {
      padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 0.9em;
    }
    .btn-primary { background: var(--color-accent); color: white; }
    .btn-secondary { background: var(--color-background); color: var(--color-text); border: 1px solid var(--color-primary); }
    .btn-danger { background: var(--color-error); color: white; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--color-primary); font-size: 0.9em; }
    th { color: var(--color-text-muted); font-weight: normal; }
    td.mono { font-family: monospace; }

    .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
    .badge.on { background: var(--color-success); color: white; }
    .badge.off { background: var(--color-text-muted); color: white; }

    .alert { padding: 12px; border-radius: var(--radius); margin: 10px 0; display: none; }
    .alert-success { background: rgba(76, 175, 80, 0.1); border: 1px solid var(--color-success); color: var(--color-success); }
    .alert-error { background: rgba(244, 67, 54, 0.1); border: 1px solid var(--color-error); color: var(--color-error); }
  </style>
</head>
<body>
  <div class="config-container">
    <div class="config-header">
      <h1>🌡️ AREXX — Capteurs</h1>
      <p>Valider un capteur détecté lui attribue un nom au format QUOI---OÙ (voir Nommage) et l'ajoute à la liste paramétrée.</p>
    </div>

    <div class="alert alert-success" id="success-alert"></div>
    <div class="alert alert-error" id="error-alert"></div>

    <div class="card">
      <div class="toolbar">
        <button class="btn btn-secondary" id="btn-refresh">🔄 Rafraîchir</button>
      </div>

      <h3>Capteurs paramétrés</h3>
      <table>
        <thead>
          <tr><th>Identifiant</th><th>Nom (QUOI---OÙ)</th><th>Type</th><th>Vers HA</th><th>Dernier relevé</th><th></th></tr>
        </thead>
        <tbody id="configured-sensors-body"></tbody>
      </table>
    </div>

    <div class="card">
      <h3>Capteurs en auto-découverte (non paramétrés)</h3>
      <table>
        <thead>
          <tr><th>Identifiant</th><th>Type</th><th>Détecté à</th><th></th></tr>
        </thead>
        <tbody id="discovered-sensors-body"></tbody>
      </table>
    </div>

    <div class="loading" id="loading" style="text-align:center;padding:20px;color:var(--color-text-muted);">
      Chargement...
    </div>
  </div>

  <!-- Page de navigation complète (pas injectée dans le Shadow DOM du core comme le tableau de
       bord) : contrairement à ce dernier, elle ne bénéficie pas du socket.io déjà chargé par
       index.html du core — il lui faut sa propre copie du script. -->
  <script defer src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="/applications/arexx/presentation/arexx/config-app.js"></script>

  <!-- Derniere modification: 2026-07-23 14:40:00 - Création de la page de configuration AREXX -->
</body>
</html>
