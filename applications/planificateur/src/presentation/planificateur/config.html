<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificateur - Macros & planifications</title>

  <link rel="stylesheet" href="/styles/main.css">

  <style>
    .plan-container { max-width: 900px; margin: 0 auto; padding: 20px; }
    .plan-header { text-align: center; margin-bottom: 30px; }
    .plan-header h1 { color: var(--color-accent); font-size: 1.8em; }

    .section { background: var(--color-surface); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .section h2 { margin-top: 0; border-bottom: 1px solid var(--color-primary); padding-bottom: 10px; }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: var(--color-background);
      border-radius: var(--radius);
      margin-bottom: 8px;
    }

    .item-info .name { font-weight: bold; color: var(--color-text); }
    .item-info .detail { font-size: 0.85em; color: var(--color-text-muted); }

    .item-actions { display: flex; gap: 6px; }

    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; margin-left: 8px; }
    .status-badge.active { background: var(--color-success); color: white; }
    .status-badge.inactive { background: var(--color-text-muted); color: white; }

    .btn { padding: 6px 12px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 0.85em; }
    .btn-primary { background: var(--color-accent); color: white; }
    .btn-secondary { background: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-primary); }
    .btn-danger { background: var(--color-error); color: white; }

    .empty { color: var(--color-text-muted); font-style: italic; padding: 10px; }
    .back-link { display: inline-block; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="plan-container">
    <div class="plan-header">
      <a class="back-link" href="/applications/planificateur/presentation/index.html">← Tableau de bord</a>
      <h1>🗓️ Macros & planifications</h1>
      <p class="description">Gestion — la création reste 100% conversationnelle (via l'application IA)</p>
    </div>

    <div class="section">
      <h2>📋 Macros</h2>
      <div id="macros-list"><div class="empty">Chargement...</div></div>
    </div>

    <div class="section">
      <h2>⏱️ Planifications</h2>
      <div id="planifications-list"><div class="empty">Chargement...</div></div>
    </div>
  </div>

  <!-- Page de navigation complète (pas injectée dans le Shadow DOM du core comme le tableau de
       bord) : contrairement à ce dernier, elle ne bénéficie pas du socket.io déjà chargé par
       index.html du core — il lui faut sa propre copie du script (même piège qu'AREXX/RFXCOM). -->
  <script defer src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="/applications/planificateur/presentation/planificateur/config-app.js"></script>

  <!-- Derniere modification: 2026-07-23 00:00:00 - Création de l'application planificateur -->
</body>
</html>
